<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linguagens da Informação — 1º Ano</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#FFF8EE;min-height:100vh;padding:0 0 40px}

.topo{background:#F5A623;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 0 #D4851A}
.topo-icon{font-size:36px;line-height:1}
.topo-title{font-size:clamp(15px,4.5vw,20px);font-weight:900;color:#3D1C00;line-height:1.1}
.topo-sub{font-size:clamp(10px,2.5vw,13px);font-weight:700;color:#6B3000;margin-top:2px;text-transform:uppercase;letter-spacing:1px}

main{max-width:680px;margin:0 auto;padding:14px 12px 0}

.act-card{background:#fff;border-radius:20px;border:3px solid #F5A623;padding:18px 14px;margin-bottom:20px;box-shadow:0 5px 0 #F5A623}
.act-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.act-num{background:#F5A623;color:#3D1C00;font-size:17px;font-weight:900;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.act-title{font-size:clamp(13px,3.8vw,17px);font-weight:900;color:#222;text-transform:uppercase;line-height:1.2;flex:1}

.feedback{border-radius:12px;padding:10px 14px;font-size:clamp(13px,3.5vw,15px);font-weight:900;margin-top:12px;display:none;line-height:1.4}
.feedback.show{display:block}
.feedback.ok{background:#D4EDDA;color:#155724;border:2px solid #28A745}
.feedback.err{background:#F8D7DA;color:#721C24;border:2px solid #DC3545}

/* ── LIGAR ── */
.ligar-wrap{display:grid;grid-template-columns:minmax(0,1fr) 50px minmax(0,1fr);gap:0;align-items:start}
.ligar-col{display:flex;flex-direction:column;gap:10px}
.ligar-svg-wrap{position:relative;align-self:stretch}
.ligar-svg-wrap svg{position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;pointer-events:none}

.palavra-item{background:#EEF6FF;border:3px solid #90C1F5;border-radius:14px;padding:10px 6px;font-size:clamp(12px,3.2vw,16px);font-weight:900;color:#1A4D8F;text-transform:uppercase;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;min-height:64px;display:flex;align-items:center;justify-content:center;user-select:none;flex-direction:column;gap:4px}
.palavra-item .pw-icon{font-size:clamp(22px,5vw,30px)}
.palavra-item:hover{border-color:#F5A623;background:#FFF4DD}
.palavra-item.sel{border-color:#F5A623;background:#FFF4DD;color:#3D1C00}
.palavra-item.done-ok{border-color:#28A745;background:#D4EDDA;color:#155724;pointer-events:none}
.palavra-item.done-err{border-color:#DC3545;background:#F8D7DA;color:#721C24;pointer-events:none}

.desenho-item{background:#FFF4E0;border:3px solid #F5A623;border-radius:14px;padding:8px 4px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;min-height:64px;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none;gap:4px}
.desenho-item .ds-emoji{font-size:clamp(26px,6vw,36px);line-height:1}
.desenho-item .ds-ex{font-size:clamp(10px,2.5vw,12px);font-weight:900;color:#888;text-transform:uppercase}
.desenho-item:hover{border-color:#D4851A}
.desenho-item.done-ok{border-color:#28A745;background:#D4EDDA;pointer-events:none}
.desenho-item.done-err{border-color:#DC3545;background:#F8D7DA;pointer-events:none}

/* ── CIRCULE ── */
.circ-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.circ-item{border:3px solid #ddd;border-radius:16px;padding:12px 6px 10px;text-align:center;background:#FAFAFA;cursor:pointer;transition:border-color .15s,background .15s;user-select:none}
.circ-item:hover{border-color:#F5A623;background:#FFF4DD}
.circ-item .ci-icon{font-size:clamp(28px,6vw,40px);display:block;margin-bottom:6px}
.circ-item .ci-txt{font-size:clamp(11px,2.8vw,13px);font-weight:900;color:#555;text-transform:uppercase}
.circ-item.sel{border-color:#F5A623;background:#FFF4DD}
.circ-item.certo{border-color:#28A745;background:#D4EDDA;pointer-events:none}
.circ-item.certo .ci-txt{color:#155724}
.circ-item.errado{border-color:#DC3545;background:#F8D7DA;pointer-events:none}
.circ-item.errado .ci-txt{color:#721C24}
.circ-item.nao-sel{border-color:#28A745;background:#D4EDDA;pointer-events:none}
.circ-item.nao-sel .ci-txt{color:#155724}

.btn-check{margin-top:14px;background:#F5A623;border:none;border-radius:12px;padding:12px 26px;font-size:clamp(14px,3.5vw,17px);font-weight:900;color:#3D1C00;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 4px 0 #D4851A;display:block}
.btn-check:active{transform:translateY(2px);box-shadow:0 2px 0 #D4851A}
.btn-check:disabled{background:#ddd;color:#999;box-shadow:0 4px 0 #bbb;cursor:default}

/* ── NOTA FINAL ── */
.nota-wrap{display:none;text-align:center;background:#fff;border-radius:22px;border:4px solid #F5A623;box-shadow:0 7px 0 #D4851A;padding:28px 16px;margin-bottom:20px}
.nota-wrap.show{display:block}
.nota-emoji{font-size:clamp(48px,12vw,64px);display:block;margin-bottom:6px}
.nota-estrelas{font-size:clamp(22px,6vw,32px);letter-spacing:5px;margin-bottom:10px}
.nota-titulo{font-size:clamp(16px,5vw,22px);font-weight:900;color:#3D1C00;margin-bottom:14px;text-transform:uppercase}
.nota-circ{width:clamp(110px,28vw,140px);height:clamp(110px,28vw,140px);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 14px;border:6px solid #F5A623;background:#FFF4DD}
.nota-circ.n10{border-color:#28A745;background:#D4EDDA}
.nota-circ.nalta{border-color:#5cb85c;background:#eafaea}
.nota-circ.nmed{border-color:#FFC107;background:#FFF3CD}
.nota-circ.nbaixa{border-color:#DC3545;background:#F8D7DA}
.nota-num{font-size:clamp(38px,10vw,52px);font-weight:900;line-height:1;color:#3D1C00}
.nota-de10{font-size:14px;font-weight:700;color:#888}
.n10 .nota-num,.nalta .nota-num{color:#155724}
.nmed .nota-num{color:#856404}
.nbaixa .nota-num{color:#721C24}
.n10 .nota-de10,.nalta .nota-de10{color:#155724}
.nmed .nota-de10{color:#856404}
.nbaixa .nota-de10{color:#721C24}
.nota-det{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;max-width:360px;margin:0 auto 14px}
.det-card{border-radius:12px;padding:10px 8px;text-align:center}
.det-card.ok{border:2px solid #28A745;background:#D4EDDA}
.det-card.par{border:2px solid #FFC107;background:#FFF3CD}
.det-card.err{border:2px solid #DC3545;background:#F8D7DA}
.det-nome{font-size:11px;font-weight:900;text-transform:uppercase;margin-bottom:3px}
.det-card.ok .det-nome{color:#155724}.det-card.par .det-nome{color:#856404}.det-card.err .det-nome{color:#721C24}
.det-pts{font-size:clamp(16px,4.5vw,20px);font-weight:900}
.det-card.ok .det-pts{color:#155724}.det-card.par .det-pts{color:#856404}.det-card.err .det-pts{color:#721C24}
.nota-msg{font-size:clamp(13px,3.5vw,16px);font-weight:700;color:#555;margin-bottom:16px;line-height:1.6;white-space:pre-line}
.btn-novo{background:#F5A623;border:none;border-radius:12px;padding:12px 28px;font-size:clamp(14px,3.5vw,17px);font-weight:900;color:#3D1C00;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 4px 0 #D4851A;text-transform:uppercase}
.btn-novo:active{transform:translateY(2px)}

footer{text-align:center;padding:12px;font-size:11px;color:#aaa;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
</style>
</head>
<body>

<div class="topo">
  <div class="topo-icon">💬</div>
  <div>
    <div class="topo-title">LINGUAGENS DA INFORMAÇÃO</div>
    <div class="topo-sub">1º ANO</div>
  </div>
</div>

<main>

<!-- AT.1 — LIGAR -->
<div class="act-card">
  <div class="act-header">
    <div class="act-num">1</div>
    <div class="act-title">TOQUE NA PALAVRA E DEPOIS NO DESENHO!</div>
  </div>
  <div class="ligar-wrap">
    <div class="ligar-col" id="col-esq"></div>
    <div class="ligar-svg-wrap" id="svg-wrap">
      <svg id="linhas-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div class="ligar-col" id="col-dir"></div>
  </div>
  <div class="feedback" id="fb1"></div>
</div>

<!-- AT.2 — CIRCULE -->
<div class="act-card">
  <div class="act-header">
    <div class="act-num">2</div>
    <div class="act-title">TOQUE EM TUDO QUE É UMA LINGUAGEM!</div>
  </div>
  <div class="circ-grid" id="circ-grid"></div>
  <button class="btn-check" id="btn2" onclick="checkQ2()">VERIFICAR ✔</button>
  <div class="feedback" id="fb2"></div>
</div>

<!-- NOTA FINAL -->
<div class="nota-wrap" id="nota-wrap">
  <span class="nota-emoji" id="nota-emoji">🏆</span>
  <div class="nota-estrelas" id="nota-estrelas"></div>
  <div class="nota-titulo" id="nota-titulo"></div>
  <div style="font-size:12px;font-weight:900;color:#aaa;text-transform:uppercase;margin-bottom:8px">SUA NOTA</div>
  <div class="nota-circ" id="nota-circ">
    <span class="nota-num" id="nota-num">10</span>
    <span class="nota-de10">de 10</span>
  </div>
  <div class="nota-det" id="nota-det"></div>
  <div class="nota-msg" id="nota-msg"></div>
  <button class="btn-novo" onclick="reiniciar()">TENTAR DE NOVO ↺</button>
</div>

</main>
<footer>Profª Adriana Bett Terebinto &nbsp;|&nbsp; Atividade Pedagógica</footer>

<script>
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function fmtN(n){return Number.isInteger(n)?String(n):n.toFixed(1).replace('.',',');}
function showFb(id,ok,msg){const el=document.getElementById(id);el.textContent=msg;el.className='feedback '+(ok?'ok':'err')+' show';}

let pts=[0,0],erros=[0,0],done=[false,false];

function checkDone(){if(done[0]&&done[1])setTimeout(mostrarNota,700);}

// ── AT.1 LIGAR ──
const pares=[
  {palavra:'🗣️ FALA',    icon:'🗣️', exemplo:'💬', ex_label:'CONVERSA'},
  {palavra:'🖌️ PINCEL', icon:'🖌️', exemplo:'🎨️', ex_label:'DESENHO'},
  {palavra:'🔢 NÚMERO',  icon:'🔢', exemplo:'📊', ex_label:'GRÁFICO'},
  {palavra:'🚷 PLACA',   icon:'🚷', exemplo:'🛣️', ex_label:'TRANSITO'},
];
let selEsq=null, ligCount=0;

function buildLigar(){
  const esq=document.getElementById('col-esq'),dir=document.getElementById('col-dir');
  esq.innerHTML='';dir.innerHTML='';
  const dirIdx=shuffle([...pares.keys()]);
  pares.forEach((p,i)=>{
    const d=document.createElement('div');d.className='palavra-item';d.id='pe-'+i;
    const label=p.palavra.split(' ').slice(1).join(' ');
    d.innerHTML=`<span class="pw-icon">${p.icon}</span>${label}`;
    d.onclick=()=>selectEsq(i);esq.appendChild(d);
  });
  dirIdx.forEach((pi,j)=>{
    const p=pares[pi];const d=document.createElement('div');
    d.className='desenho-item';d.id='pd-'+j;d.dataset.target=pi;
    d.innerHTML=`<span class="ds-emoji">${p.exemplo}</span><span class="ds-ex">${p.ex_label}</span>`;
    d.onclick=()=>selectDir(j);dir.appendChild(d);
  });
  resizeSvg();
}
function resizeSvg(){
  const wrap=document.getElementById('svg-wrap'),esq=document.getElementById('col-esq');
  const h=esq.offsetHeight;wrap.style.height=h+'px';
  const svg=document.getElementById('linhas-svg');
  svg.setAttribute('viewBox','0 0 50 '+h);svg.innerHTML='';
}
function selectEsq(i){
  const el=document.getElementById('pe-'+i);
  if(el.classList.contains('done-ok')||el.classList.contains('done-err'))return;
  document.querySelectorAll('.palavra-item').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');selEsq=i;
}
function selectDir(j){
  const el=document.getElementById('pd-'+j);
  if(el.classList.contains('done-ok')||el.classList.contains('done-err'))return;
  if(selEsq===null){showFb('fb1',false,'👆 TOQUE PRIMEIRO NA PALAVRA!');return;}
  const alvo=parseInt(el.dataset.target);
  const pe=document.getElementById('pe-'+selEsq);
  if(alvo===selEsq){
    pe.classList.remove('sel');pe.classList.add('done-ok');
    el.classList.add('done-ok');drawLinha(selEsq,j,'#28A745');
    selEsq=null;ligCount++;
    document.getElementById('fb1').className='feedback';
    if(ligCount===pares.length){
      const p=Math.max(0,5-erros[0]);pts[0]=p;done[0]=true;
      showFb('fb1',true,'✔ PARABÉNS! VOCÊ LIGOU TUDO! ('+fmtN(p)+' pontos)');
      checkDone();
    }
  } else {
    erros[0]++;
    pe.classList.remove('sel');
    pe.classList.add('done-err');el.classList.add('done-err');
    drawLinha(selEsq,j,'#DC3545');
    selEsq=null;
    showFb('fb1',false,'✘ ERROU! CONTINUE TENTANDO! (−1 PONTO)');
    setTimeout(()=>{
      document.querySelectorAll('.done-err').forEach(e=>{
        // só desfaz se ainda não completou o par correto
        if(!e.classList.contains('done-ok')){e.classList.remove('done-err');}
      });
      // remove linhas vermelhas
      document.querySelectorAll('#linhas-svg line[stroke="#DC3545"]').forEach(l=>l.remove());
      document.getElementById('fb1').className='feedback';
    },1400);
  }
}
function drawLinha(ei,di,color){
  const le=document.getElementById('pe-'+ei),re=document.getElementById('pd-'+di);
  const wrap=document.getElementById('svg-wrap');
  const wr=wrap.getBoundingClientRect(),lr=le.getBoundingClientRect(),rr=re.getBoundingClientRect();
  const y1=(lr.top+lr.height/2)-wr.top,y2=(rr.top+rr.height/2)-wr.top;
  const svg=document.getElementById('linhas-svg');
  svg.setAttribute('viewBox','0 0 50 '+wrap.offsetHeight);
  const line=document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1','2');line.setAttribute('y1',y1);
  line.setAttribute('x2','48');line.setAttribute('y2',y2);
  line.setAttribute('stroke',color);line.setAttribute('stroke-width','3');line.setAttribute('stroke-linecap','round');
  svg.appendChild(line);
}
buildLigar();window.addEventListener('resize',buildLigar);

// ── AT.2 CIRCULE ──
const q2Data=[
  {icon:'🗣️',label:'FALA',ok:true},
  {icon:'✏️',label:'DESENHO',ok:true},
  {icon:'🔢',label:'NÚMERO',ok:true},
  {icon:'🪧',label:'SINAL',ok:true},
  {icon:'🍎',label:'MAÇÃ',ok:false},
  {icon:'⚽',label:'BOLA',ok:false},
];
let q2Embaralhado=[],q2Checked=false;
function buildQ2(){
  q2Embaralhado=shuffle(q2Data);
  const grid=document.getElementById('circ-grid');grid.innerHTML='';
  q2Embaralhado.forEach((item,i)=>{
    const d=document.createElement('div');d.className='circ-item';d.id='ci-'+i;
    d.innerHTML=`<span class="ci-icon">${item.icon}</span><span class="ci-txt">${item.label}</span>`;
    d.onclick=()=>{if(!q2Checked&&!d.classList.contains('certo')&&!d.classList.contains('errado'))d.classList.toggle('sel');};
    grid.appendChild(d);
  });
}
buildQ2();
function checkQ2(){
  if(q2Checked)return;q2Checked=true;
  let certas=0,total=q2Data.filter(x=>x.ok).length;
  q2Embaralhado.forEach((item,i)=>{
    const d=document.getElementById('ci-'+i);
    const sel=d.classList.contains('sel');
    d.onclick=null;d.classList.remove('sel');
    if(item.ok&&sel){d.classList.add('certo');certas++;}
    else if(!item.ok&&sel){d.classList.add('errado');erros[1]++;}
    else if(item.ok&&!sel){d.classList.add('nao-sel');}  // mostra o que faltou marcar
  });
  const p=Math.max(0,5-erros[1]);pts[1]=p;done[1]=true;
  document.getElementById('btn2').disabled=true;
  if(erros[1]===0)showFb('fb2',true,'✔ MUITO BEM! FALA, DESENHO, NÚMERO E SINAL SÃO LINGUAGENS! ('+fmtN(p)+' pontos)');
  else showFb('fb2',false,'✘ QUASE! AS VERDES SÃO AS CORRETAS. ('+fmtN(p)+' pontos)');
  checkDone();
}

// ── NOTA FINAL ──
function mostrarNota(){
  const total=pts[0]+pts[1];
  document.getElementById('nota-num').textContent=fmtN(total);
  const circ=document.getElementById('nota-circ');
  circ.className='nota-circ '+(total===10?'n10':total>=7?'nalta':total>=5?'nmed':'nbaixa');
  document.getElementById('nota-det').innerHTML=
    [['LIGAR',pts[0]],['LINGUAGENS',pts[1]]].map(([n,p])=>
      `<div class="det-card ${p>=5?'ok':p>=2?'par':'err'}"><div class="det-nome">${n}</div><div class="det-pts">${fmtN(p)} pts</div></div>`
    ).join('');
  let emoji,ests,titulo,msg;
  if(total===10){emoji='🏆';ests='⭐⭐⭐';titulo='NOTA 10! INCRÍVEL!';msg='VOCÊ ACERTOU TUDO!\nPARABÉNS!';}
  else if(total>=7){emoji='😄';ests='⭐⭐';titulo='MUITO BEM!';msg='VOCÊ APRENDEU MUITO!\nTENTE DE NOVO PARA TIRAR 10!';}
  else{emoji='💪';ests='⭐';titulo='CONTINUE TENTANDO!';msg='TENTE DE NOVO!\nVOCÊ CONSEGUE!';}
  document.getElementById('nota-emoji').textContent=emoji;
  document.getElementById('nota-estrelas').textContent=ests;
  document.getElementById('nota-titulo').textContent=titulo;
  document.getElementById('nota-msg').textContent=msg;
  const wrap=document.getElementById('nota-wrap');
  wrap.style.display='block';wrap.classList.add('show');
  setTimeout(()=>wrap.scrollIntoView({behavior:'smooth',block:'start'}),100);
}

function reiniciar(){
  pts=[0,0];erros=[0,0];done=[false,false];q2Checked=false;
  selEsq=null;ligCount=0;buildLigar();
  buildQ2();document.getElementById('btn2').disabled=false;
  ['fb1','fb2'].forEach(id=>document.getElementById(id).className='feedback');
  const wrap=document.getElementById('nota-wrap');wrap.classList.remove('show');wrap.style.display='none';
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
